<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <meta property="og:title" content="Chen Zhao Photography">
    <meta property="og:description" content="以光影為筆，山河城闕皆入卷。">
    <meta property="og:image" content="https://pub-54cde7e641974c65b28dfbd298c00df6.r2.dev/og-preview.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://pub-54cde7e641974c65b28dfbd298c00df6.r2.dev/og-preview.jpg">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        header a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        header a:hover { color: #fff; }

        header h1 {
            margin-top: 16px;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #fff;
        }

        header p {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #888;
        }

        .gallery {
            max-width: 800px;
            margin: 30px auto 0;
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: 4px;
            line-height: 0;
            background: #1a1a1a;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.4s ease, filter 0.4s ease;
        }

        .gallery-item img.loaded {
            opacity: 1;
        }

        .gallery-item:hover img.loaded {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: shimmer 1.5s infinite;
            pointer-events: none;
        }

        .gallery-item.done::after {
            display: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 2rem;
            padding: 20px 16px;
            cursor: pointer;
            z-index: 1001;
            transition: background 0.2s;
        }

        .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }

        .lightbox-close {
            position: fixed;
            top: 20px; right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 40px 20px 20px;
        }

        .pagination button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 16px;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .pagination button:hover { background: #2a2a2a; color: #fff; border-color: #555; }
        .pagination button:disabled { opacity: 0.3; cursor: default; }
        .pagination button:disabled:hover { background: #1a1a1a; color: #aaa; border-color: #333; }

        .pagination .page-info {
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            min-width: 80px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #444;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">&larr; BACK TO GALLERY</a>
        <h1 id="trip-title"></h1>
        <p id="trip-info"></p>
    </header>

    <div class="gallery" id="gallery"></div>

    <div class="pagination" id="pagination">
        <button onclick="changePage(-1)" id="prev-btn">&lsaquo; Prev</button>
        <span class="page-info" id="page-info"></span>
        <button onclick="changePage(1)" id="next-btn">Next &rsaquo;</button>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">&lsaquo;</button>
        <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">&rsaquo;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <footer>&copy; Chen Zhao Photography</footer>

    <script>
        const R2_BASE = 'https://pub-54cde7e641974c65b28dfbd298c00df6.r2.dev';

        const trips = {
            'westworld': {
                title: 'Westworld',
                date: 'March 2024',
                photos: ['DSC03728-4.jpg','DSC04816.jpg','DSC03454.jpg','DSC03487.jpg','DSC04097.jpg','DSC03820.jpg','DSC05292.jpg','DSC05490-2.jpg','DSC04848.jpg','DSC04696.jpg','DSC04879-2.jpg','DSC03621-2.jpg','DSC04854.jpg','DSC05090.jpg','DSC04772-2.jpg','DSC04916-2.jpg','DSC04647.jpg','DSC04448.jpg','DSC03909-2.jpg','DSC05416.jpg'],
                ratios: [1.5,1.5,1.5,1.5,0.667,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,0.667]
            },
            'southwest-odyssey': {
                title: 'Southwest Odyssey',
                date: 'March 2025',
                photos: ['DSC02710-2.jpg','DSC05914.jpg','DSC06831.jpg','DSC07753-3.jpg','DSC06673-2.jpg','DSC07707.jpg','DSC06808.jpg','DSC07356.jpg','DSC06349.jpg','DSC06798.jpg','DSC08109.jpg','DSC06696-2.jpg','DSC07394-Enhanced-NR.jpg','DSC06754-2.jpg','DSC06335.jpg','DSC07284.jpg','DSC06715.jpg','DSC07804.jpg','DSC07842.jpg','DSC05954.jpg','DSC07704.jpg','DSC06712.jpg','DSC06000-2.jpg','DSC07486-Enhanced-NR.jpg','DSC05883-2.jpg','DSC06888-2.jpg','DSC06027.jpg','DSC05949.jpg','DSC07266.jpg','DSC06804.jpg','DSC08121.jpg','DSC07877.jpg','DSC06061.jpg','DSC07159.jpg','DSC02568.jpg','DSC06642.jpg','DSC02532.jpg','DSC07194.jpg','DSC07728.jpg','DSC06023.jpg','DSC07895.jpg','DSC07609.jpg','DSC07312-2.jpg','DSC07098.jpg','DSC06653.jpg','DSC05980.jpg','DSC08000.jpg','DSC06364-2.jpg','DSC06090.jpg','DSC06687.jpg','DSC06625-2.jpg','DSC08224.jpg'],
                ratios: [1.5,1.5,1.5,1.5,1.5,0.667,0.667,1.5,1.5,1.5,1.5,1.5,1.5,1.5,0.667,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,0.667,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,0.667,1.5,1.5,0.667,1.5,1.5,0.667,0.667,1.5,1.5,1.5]
            },
            'yellowstone-grand-teton': {
                title: 'Yellowstone & Grand Teton',
                date: 'May 2024',

                ratios: [1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5]
            },

                date: 'December 2024',
                photos: ['DSC02506-2.jpg','DSC02656-Enhanced-NR.jpg','DSC02060.jpg','DSC03148.jpg','DSC02101.jpg','DSC02847.jpg','DSC02374.jpg','DSC03083.jpg','DSC02802.jpg','DSC02358.jpg','DSC02572.jpg','DSC03190.jpg','DSC02159.jpg','DSC03073.jpg','DSC02340.jpg','DSC02874-Enhanced-NR.jpg','DSC03271.jpg','DSC02330.jpg','DSC02122.jpg','DSC02177.jpg','DSC03077.jpg','DSC02221.jpg','DSC02191.jpg','DSC02935.jpg','DSC02217.jpg','DSC03321.jpg','DSC02478.jpg'],
                ratios: [1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,1.5,0.667,0.667,1.5,1.5,1.5,1.5,0.667,1.5,1.5,0.667,1.5,0.667,1.5,1.5,0.667,1.5,1.5,1.5]
            },
            'pacific-to-desert': {
                title: 'Pacific to Desert',
                date: 'November 2024',
                photos: ['DSC00240-Enhanced-NR.jpg','DSC09160.jpg','DSC09071.jpg','DSC09510-Enhanced-NR.jpg','DSC09230.jpg','DSC09787.jpg','DSC09481-Enhanced-NR.jpg','DSC00031-Enhanced-NR.jpg','DSC09577.jpg','DSC09761-Enhanced-NR.jpg','DSC09939-Enhanced-NR-2.jpg','DSC08974.jpg','DSC09705-Enhanced-NR.jpg','DSC01329.jpg','DSC00122-Enhanced-NR.jpg'],
                ratios: [1.5,1.5,1.419,0.667,1.5,1.5,1.5,1.5,0.667,1.5,0.667,1.5,0.667,1.542,1.5]
            },
            'all-the-way-south': {
                title: 'All the Way South',
                date: 'August 2024',
                photos: ['DSC04367.jpg','DSC06467-Enhanced-NR.jpg','DSC04263.jpg','DSC05916-2.jpg','DSC05809.jpg','DSC05183.jpg','DSC05880.jpg','DSC04431.jpg','DSC03809.jpg','DSC04859.jpg','DSC04372.jpg','DSC04884.jpg'],
                ratios: [1.438,1.5,1.5,1.5,1.5,1.5,1.514,1.516,1.5,1.5,0.667,1.5]
            },
            'nyc-october': {
                title: 'Shadows of Gotham',
                date: 'October 2025',
                photos: ['DSC09364.jpg','DSC09322.jpg','DSC09361.jpg','DSC08779.jpg','DSC09366.jpg','DSC08788.jpg','DSC09373.jpg','DSC09620.jpg','DSC09622-2.jpg','DSC08834.jpg','DSC08756.jpg','DSC09331.jpg','DSC09387.jpg'],
                ratios: [1.5,1.5,1.5,1.5,1.5,1.5,0.667,1.5,1.5,1.5,0.667,1.5,1.5]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('id');
        const trip = trips[tripId];
        let currentIndex = 0;
        let displayOrder = [];
        const PER_PAGE = 5;
        let currentPage = 1;
        let totalPages = 1;

        function init() {
            if (!trip) {
                document.body.innerHTML = '<p style="text-align:center;padding:100px;color:#888">Trip not found.</p>';
                return;
            }

            document.title = trip.title + ' - Gallery';
            document.getElementById('trip-title').textContent = trip.title;
            document.getElementById('trip-info').textContent = `${trip.date} · ${trip.photos.length} photos`;

            // Shuffle order (cover stays first)
            displayOrder = [0];
            for (let i = 1; i < trip.photos.length; i++) displayOrder.push(i);
            for (let i = displayOrder.length - 1; i > 1; i--) {
                const j = 1 + Math.floor(Math.random() * i);
                [displayOrder[i], displayOrder[j]] = [displayOrder[j], displayOrder[i]];
            }

            totalPages = Math.ceil(displayOrder.length / PER_PAGE);
            renderPage();
        }

        function renderPage() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            const start = (currentPage - 1) * PER_PAGE;
            const end = Math.min(start + PER_PAGE, displayOrder.length);

            for (let idx = start; idx < end; idx++) {
                const i = displayOrder[idx];
                const photo = trip.photos[i];
                const ratio = trip.ratios[i] || 1.5;

                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.style.aspectRatio = ratio;

                const img = document.createElement('img');
                img.dataset.src = `${R2_BASE}/${tripId}/${photo}`;
                img.alt = photo;
                img.style.aspectRatio = ratio;
                img.onclick = () => openLightbox(i);
                item.appendChild(img);
                gallery.appendChild(item);
            }

            // Lazy load
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.removeAttribute('data-src');
                        img.onload = () => {
                            img.classList.add('loaded');
                            img.parentElement.classList.add('done');
                        };
                        observer.unobserve(img);
                    }
                });
            }, { rootMargin: '600px' });

            document.querySelectorAll('.gallery-item img[data-src]').forEach(img => {
                observer.observe(img);
            });

            // Update pagination
            document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
        }

        function changePage(dir) {
            currentPage += dir;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = `${R2_BASE}/${tripId}/${trip.photos[currentIndex]}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function navLightbox(dir) {
            event.stopPropagation();
            currentIndex = (currentIndex + dir + trip.photos.length) % trip.photos.length;
            document.getElementById('lightbox-img').src = `${R2_BASE}/${tripId}/${trip.photos[currentIndex]}`;
        }

        document.getElementById('lightbox').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeLightbox();
        });

        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navLightbox(-1);
            if (e.key === 'ArrowRight') navLightbox(1);
        });

        init();
    </script>
</body>
</html>
