<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        header a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        header a:hover { color: #fff; }

        header h1 {
            margin-top: 16px;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #fff;
        }

        header p {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #888;
        }

        .gallery {
            max-width: 1400px;
            margin: 30px auto 0;
            padding: 20px;
            columns: 1;
            column-gap: 16px;
        }

        @media (min-width: 768px) {
            .gallery { columns: 2; }
        }

        @media (min-width: 1200px) {
            .gallery { columns: 3; }
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 16px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 4px;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 2rem;
            padding: 20px 16px;
            cursor: pointer;
            z-index: 1001;
            transition: background 0.2s;
        }

        .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }

        .lightbox-close {
            position: fixed;
            top: 20px; right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #444;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">&larr; BACK TO GALLERY</a>
        <h1 id="trip-title"></h1>
        <p id="trip-info"></p>
    </header>

    <div class="gallery" id="gallery"></div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">&lsaquo;</button>
        <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">&rsaquo;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <footer>&copy; Chen Zhao Photography</footer>

    <script>
        const R2_BASE = 'https://pub-54cde7e641974c65b28dfbd298c00df6.r2.dev';

        const trips = {
            'west-coast-national-parks': {
                title: 'West Coast National Parks',
                date: 'March 2025',
                photos: ['DSC02710-2.jpg', 'DSC05883-2.jpg', 'DSC06000-2.jpg', 'DSC08121.jpg']
            }
        };

        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('id');
        const trip = trips[tripId];

        let currentIndex = 0;

        function init() {
            if (!trip) {
                document.body.innerHTML = '<p style="text-align:center;padding:100px;color:#888">Trip not found.</p>';
                return;
            }

            document.title = trip.title + ' - Gallery';
            document.getElementById('trip-title').textContent = trip.title;
            document.getElementById('trip-info').textContent = `${trip.date} · ${trip.photos.length} photos`;

            const gallery = document.getElementById('gallery');
            trip.photos.forEach((photo, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                const img = document.createElement('img');
                img.src = `${R2_BASE}/${tripId}/${photo}`;
                img.alt = photo;
                img.loading = 'lazy';
                img.onclick = () => openLightbox(index);
                item.appendChild(img);
                gallery.appendChild(item);
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = `${R2_BASE}/${tripId}/${trip.photos[currentIndex]}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function navLightbox(dir) {
            event.stopPropagation();
            currentIndex = (currentIndex + dir + trip.photos.length) % trip.photos.length;
            document.getElementById('lightbox-img').src = `${R2_BASE}/${tripId}/${trip.photos[currentIndex]}`;
        }

        document.getElementById('lightbox').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeLightbox();
        });

        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navLightbox(-1);
            if (e.key === 'ArrowRight') navLightbox(1);
        });

        init();
    </script>
</body>
</html>
