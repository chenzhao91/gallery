<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chen Zhao Photography</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 80px 20px 20px;
        }

        header h1 {
            font-size: 2.6rem;
            font-weight: 200;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #fff;
        }

        .motto {
            margin-top: 28px;
            line-height: 2;
        }

        .motto .cn {
            font-size: 1.05rem;
            font-weight: 300;
            color: #ccc;
            letter-spacing: 0.25em;
        }

        .motto .latin {
            font-size: 0.9rem;
            font-style: italic;
            font-weight: 300;
            color: #777;
            letter-spacing: 0.08em;
            margin-top: 6px;
        }

        nav {
            text-align: center;
            padding: 30px 20px 40px;
        }

        nav a {
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0 16px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active { color: #fff; }

        .divider {
            width: 40px;
            height: 1px;
            background: #333;
            margin: 0 auto 50px;
        }

        .trips {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 24px;
        }

        @media (max-width: 560px) {
            .trips { grid-template-columns: 1fr; }
            header h1 { font-size: 1.6rem; letter-spacing: 0.2em; }
        }

        .trip-card {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            aspect-ratio: 3 / 2;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .trip-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.4s ease;
        }

        .trip-card:hover img {
            transform: scale(1.04);
            filter: brightness(1.1);
        }

        .trip-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 24px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.75));
        }

        .trip-card .overlay h2 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #fff;
        }

        .trip-card .overlay span {
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 0.05em;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #333;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Chen Zhao</h1>
        <div class="motto">
            <div class="cn">以光影為筆，山河城闕皆入卷。</div>
            <div class="latin">Lux pinxit, mundus narravit.</div>
        </div>
    </header>

    <nav>
        <a href="index.html" class="active">Gallery</a>
        <a href="about.html">About</a>
    </nav>

    <div class="divider"></div>

    <div class="trips" id="trips"></div>

    <footer>&copy; Chen Zhao Photography</footer>

    <script>

        function init() {
            const container = document.getElementById('trips');
            trips.forEach(trip => {
                const a = document.createElement('a');
                a.className = 'trip-card';
                a.href = `trip.html?id=${trip.id}`;
                a.innerHTML = `
                    <img src="${R2_BASE}/${trip.id}/${trip.cover}" alt="${trip.title}" loading="lazy">
                    <div class="overlay">
                        <h2>${trip.title}</h2>
                        <span>${trip.date} &middot; ${trip.photos.length} photos</span>
                    </div>
                `;
                container.appendChild(a);
            });
        }

        init();
    </script>
</body>
</html>
