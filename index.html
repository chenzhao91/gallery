    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 80px 20px 20px;
        }

        header h1 {
            font-size: 2.6rem;
            font-weight: 200;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #fff;
        }

        .motto {
            margin-top: 28px;
            line-height: 2;
        }

        .motto .latin {
            font-size: 0.9rem;
            font-style: italic;
            font-weight: 300;
            color: #777;
            letter-spacing: 0.08em;
            margin-top: 6px;
        }

        nav {
            text-align: center;
            padding: 30px 20px 40px;
        }

        nav a {
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0 16px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active { color: #fff; }

        .divider {
            width: 40px;
            height: 1px;
            background: #333;
            margin: 0 auto 50px;
        }

        .trips {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .trip-card {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            line-height: 0;
        }

        .trip-card img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease, filter 0.4s ease;
        }

        .trip-card:hover img {
            transform: scale(1.04);
            filter: brightness(1.1);
        }

        .trip-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 24px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.75));
        }

        .trip-card .overlay h2 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #fff;
        }

        .trip-card .overlay span {
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 0.05em;
        }

        @media (max-width: 560px) {
            header h1 { font-size: 1.6rem; letter-spacing: 0.2em; }
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #333;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
