<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Chen Zhao Photography</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #fff;
        }

        header p {
            margin-top: 12px;
            font-size: 1rem;
            font-weight: 300;
            color: #888;
            letter-spacing: 0.1em;
        }

        .trips {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 24px;
        }

        @media (max-width: 560px) {
            .trips { grid-template-columns: 1fr; }
        }

        .trip-card {
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            aspect-ratio: 3 / 2;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .trip-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.4s ease;
        }

        .trip-card:hover img {
            transform: scale(1.05);
            filter: brightness(1.15);
        }

        .trip-card .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        .trip-card .overlay h2 {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            color: #fff;
        }

        .trip-card .overlay span {
            font-size: 0.85rem;
            color: #aaa;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #444;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gallery</h1>
        <p>Landscape Photography by Chen Zhao</p>
    </header>

    <div class="trips" id="trips"></div>

    <footer>&copy; Chen Zhao Photography</footer>

    <script>
        const R2_BASE = 'https://pub-54cde7e641974c65b28dfbd298c00df6.r2.dev';

        const trips = [
            {
                id: 'west-coast-national-parks',
                title: 'West Coast National Parks',
                date: 'March 2025',
                cover: 'DSC02710-2.jpg',
                photos: ['DSC02710-2.jpg', 'DSC05883-2.jpg', 'DSC06000-2.jpg', 'DSC08121.jpg']
            },
            {
                id: 'yellowstone-grand-teton',
                title: 'Yellowstone & Grand Teton',
                date: 'May 2024',
                cover: 'DSC07706-2.jpg',
                photos: ['DSC07706-2.jpg', 'DSC00364.jpg', 'DSC00419.jpg']
            }
        ];

        function init() {
            const container = document.getElementById('trips');
            trips.forEach(trip => {
                const a = document.createElement('a');
                a.className = 'trip-card';
                a.href = `trip.html?id=${trip.id}`;
                a.innerHTML = `
                    <img src="${R2_BASE}/${trip.id}/${trip.cover}" alt="${trip.title}" loading="lazy">
                    <div class="overlay">
                        <h2>${trip.title}</h2>
                        <span>${trip.date} &middot; ${trip.photos.length} photos</span>
                    </div>
                `;
                container.appendChild(a);
            });
        }

        init();
    </script>
</body>
</html>
